<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        list-style: none;
      }
      .gnb li {
        position: relative;
      }
      .gnb > li::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 100%;
        height: 1px;
        background: #000;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 1s;
      }
      .gnb > li.on::after {
        transform: scaleX(1);
        transform-origin: left;
      }
      .gnb > li.active::after {
        background: #000;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul class="gnb">
        <li>COMPANY</li>
        <li>BUSINESS</li>
        <li>INVESTORS</li>
        <li>RESPONSIBILITY</li>
        <li>PEOPLE</li>
        <li>NEWS</li>
      </ul>
    </nav>
    <script>
      let gnb = document.querySelectorAll(".gnb li");

      gnb.forEach(function (v, k, allitem) {
        v.onmouseenter = function () {
          allitem.forEach(function (el) {
            el.classList.remove("on", "active");
          });
          v.classList.add("on");
        };
        v.onmouseleave = function () {
          allitem.forEach(function (el) {
            el.classList.remove("on", "active");
          });
          v.classList.remove("on");
        };
      });
    </script>
  </body>
</html>
