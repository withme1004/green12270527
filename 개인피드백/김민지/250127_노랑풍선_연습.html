<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>노랑풍선</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        margin-top: 50px;
      }

      a {
        text-decoration: none;
        color: #fff;
      }
      p {
        font-family: "Noto Sans KR", serif;
        font-weight: bold;
        font-size: 24px;
        word-break: keep-all;
      }
      .wrap {
        width: 1480px;
        margin: 0 auto;
      }
      .con {
        list-style: none;
      }

      .con li {
        float: left;
        width: 154px;
        height: 500px;
        overflow: hidden;
        margin: 10px;
        border-radius: 10px;
        padding: 4px;
        background-size: cover;
        background-position: center;
      }
      .con li p {
        text-align: center;
        margin-top: 230px;
      }

      .con li:nth-child(1) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_1.jpg);
      }
      .con li:nth-child(2) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_2.jpg);
        background-position: 0%;
      }
      .con li:nth-child(3) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_4.jpg);
        background-position: left bottom;
      }
      .con li:nth-child(4) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_5.jpg);
      }
      .con li:nth-child(5) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_6.jpg);
      }
      .con li:nth-child(6) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_3.jpg);
      }
      .con li:nth-child(7) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_7.jpg);
      }
      .con li:nth-child(8) {
        background-image: url(https://company.ybtour.co.kr/images/bg/bg_category_8.jpg);
        background-position: right bottom;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <ul class="con">
        <li>
          <a href="#">
            <p>Package</p>
          </a>
        </li>
        <li>
          <a href="#">
            <p>Honeymoon</p>
          </a>
        </li>
        <li>
          <a href="#">
            <p>Golf <br />&Theme</p>
          </a>
        </li>
        <li>
          <a href="#">
            <p>Air Ticket</p>
          </a>
        </li>
        <li>
          <a href="#">
            <p>Hotel</p>
          </a>
        </li>
        <li>
          <a href="#">
            <p>Tour<br />&Ticket</p>
          </a>
        </li>
        <li>
          <a href="#">
            <p>Domestic</p>
          </a>
        </li>
        <li>
          <a href="#">
            <p>Incentive</p>
          </a>
        </li>
      </ul>
    </div>
  </body>
</html>
