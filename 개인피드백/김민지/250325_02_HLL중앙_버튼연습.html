<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
    
      *{margin: 0;padding: 0;}
      ul{list-style: none;}
      a{text-decoration: none;}
      .wrap{width: 1200px; margin: 0 auto;}

      .list{ 
        width: 100%;
         margin: 0 auto;}

      .list ul{
        display: flex;
        gap: 20px;
        justify-content: center;}

      .list ul li{
        border: 1px solid #444;
         padding: 10px 30px;
         box-sizing: border-box;
        }
        
        .con ul li {opacity: 0;} 
        .con ul li.active{opacity: 1;} /* 얘를 잘 기억해둬야한다..오타안나게.. */

       .con ul li p{
        display: flex;
        justify-content: center;
         /* background: #ccc; */
        }

  
      .con ul li p:first-child{
          width: 30%;
         object-fit: cover;
          position: absolute;
          top: 100px; left:50%;
          transform: translateX(-50%);}

      .con ul li p img{width: 100%;}

      .con ul li p:first-child img{
        width: 50%;
         height: 50%;
         object-fit: contain;}

      .con ul li p:last-child{
        position: absolute;
        top: 30%; left: 0;}
 
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="list">
        <ul>
          <li>ELLE</li>
          <li>COSMOPOLITAN</li>
          <li>Harper’s BAZAAR</li>
          <li>ESQUIRE</li>
          <li>STUDIO DOT</li>
          <li>YEET</li>
        </ul>
      </div>
      <div class="con">
       <ul>
        <li>
          <p><img src="https://www.hll.kr/resources/images/main/logo-elle.svg" alt=""></p>
          <p><img src="https://www.hll.kr/resources/images/img_visual_elle_pc.png" alt=""></p>
        </li>
        <li>
          <p><img src="https://www.hll.kr/resources/images/main/logo-cosmopolitan.svg" alt=""></p>
          <p><img src="https://www.hll.kr/resources/images/img_visual_cosmopolitan_pc.png" alt=""></p>
        </li>
        <li>
          <p><img src="https://www.hll.kr/resources/images/main/logo-BAZAAR.svg" alt=""></p>
          <p><img src="https://www.hll.kr/resources/images/img_visual_bazaar_pc.png" alt=""></p>
        </li>
        <li>
          <p><img src="https://www.hll.kr/resources/images/main/logo-esquire.svg" alt=""></p>
          <p><img src="https://www.hll.kr/resources/images/img_visual_esquire_pc.png" alt=""></p>
        </li>
        <li>
          <p><img src="https://www.hll.kr/resources/images/main/logo-studio.svg" alt=""></p>
          <p><img src="https://www.hll.kr/resources/images/img_visual_studio_pc.png" alt=""></p>
        </li>
        <li>
          <p><img src="https://www.hll.kr/resources/images/main/logo-yeet.png" alt=""></p>
          <p><img src="https://www.hll.kr/resources/images/img_visual_yeet_pc.png" alt=""></p>
        </li>
       </ul>
      </div>
    </div>
    <script>

 // 첫 번째 li를 활성화
      document.querySelectorAll(".con ul li")[0].classList.add("active");

 // 모든 이미지에서 'active' 클래스를 제거... v가 (.클래스 ul li)안에 들어있는 녀석들 전체 집합? 같은거니까 v 넣어준듯...

    function myremove() {
    document.querySelectorAll(".list ul li").forEach(function (v) {
    v.classList.remove("active");
  });

    document.querySelectorAll(".con ul li").forEach(function (v) {
    v.classList.remove("active");
  });
}

// >onclick<이게 클릭한다는 뜻이고 v는 전체집합, k는 각 li 번호키... v,k = 다 부를거니까 키 가지고 오라는 뜻..인듯...
document.querySelectorAll(".list ul li").forEach(function (v, k) {
  v.onclick = function () {
    myremove(); // 이전 활성화된 요소를 제거..
    document.querySelectorAll(".con ul li")[k].classList.add("active"); // 이건 모르겠음
  };
});

   
    </script>
  </body>
</html>
