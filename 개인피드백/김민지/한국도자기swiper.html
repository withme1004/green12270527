<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Swiper demo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ul {
        list-style: none;
      }
      a {
        text-decoration: none;
      }
      .visual {
        position: relative;
        margin: 0 12px;
        height: 660px;
        display: flex;
        background: #f9f9fb;
      }
      .visual .left {
        width: 40%;
      }
      .visual .left ul {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .visual .left ul li {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        display: flex;
        justify-content: center;
        opacity: 0;
      }
      .visual .left ul li > div {
        width: 80%;
        display: flex;
        flex-direction: column;
        gap: 30px;
        background: #ccc;
      }
      .visual .left ul li.on {
        opacity: 1;
        /* height: auto; */
      }
      .visual .left ul li .txt {
        overflow: hidden;
        transform: scaleY(0);
        transform-origin: left bottom;
      }
      .visual .left ul li.on .txt {
        transform: scaleY(1);
      }
      .visual .left ul li h1 {
        position: relative;
        top: 40px;
        transition: 1s;
      }
      .visual .left ul li.on h1 {
        top: 0px;
      }
      .visual .left h1 {
        font-size: 52px;
      }
      .visual .right {
        width: 60%;
      }
      .swiper {
        width: 100%;
        height: 100%;
      }

      .swiper-slide {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .page span {
        font-size: 24px;
      }
      .swiper-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #btn {
        position: absolute;
        bottom: 0;
        left: 20%;
        width: 200px;
        display: flex;
        justify-content: center;
      }
      #btn .page .start {
        font-size: 40px;
      }
      #btn .swiper-button-next,
      #btn .swiper-button-prev {
        color: #ccc;
      }
      #btn .swiper-button-next:after,
      #btn .swiper-button-prev:after {
        font-size: 15px;
      }
    </style>
  </head>

  <body>
    <!-- Swiper -->
    <div class="visual">
      <div class="left">
        <ul>
          <li>
            <div class="text-box">
              <div class="txt">
                <h1>일상의 행복을 위한</h1>
              </div>
              <div class="txt">
                <h1>한국도자기 공식몰<br /></h1>
              </div>
              <p>
                일상에서 편하고 아름답게 사용할 수 있는 <br />테이블웨어를
                제안합니다.
              </p>
              <a href="#"
                >공식몰 바로가기<i class="fa-solid fa-arrow-right"></i
              ></a>
            </div>
          </li>
          <li>
            <div class="text-box">
              <div class="txt"><h1>연(姸) 컬렉션</h1></div>
              <p>전통 옷감인 모시를 모티브로 한<br />연 컬렉션을 만나보세요.</p>
            </div>
          </li>
          <li>
            <div class="text-box">
              <div class="txt">
                <h1>티보에렘</h1>
              </div>
              <div class="txt">
                <h1>오브제 컬렉션</h1>
              </div>
              <p>
                프랑스 일러스트레이터 티보에렘이 그려낸<br />환상적인 오브제를
                선보입니다.
              </p>
            </div>
          </li>
        </ul>
      </div>
      <div class="right">
        <div class="swiper mySwiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <img
                src="https://group.hankook.com/default/img/onepixel/images/main/main-slide1.jpg"
                alt=""
              />
            </div>
            <div class="swiper-slide">
              <img
                src="https://group.hankook.com/default/img/onepixel/images/main/main-slide2.jpg"
                alt=""
              />
            </div>
            <div class="swiper-slide">
              <img
                src="https://group.hankook.com/default/img/onepixel/images/main/main-slide3.jpg"
                alt=""
              />
            </div>
          </div>
        </div>
        <div id="btn">
          <div class="swiper-button-next"></div>
          <div class="page">
            <span class="start"></span> / <span class="end"></span>
          </div>
          <div class="swiper-button-prev"></div>
        </div>
      </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
      let mainText = document.querySelectorAll(".left ul li");
      let len = document.querySelectorAll(".swiper-slide").length;
      mainText[0].classList.add("on");
      function myfnc() {
        mainText.forEach(function (v, k) {
          v.classList.remove("on");
          v.querySelector("h1").classList.remove("on");
        });
      }
      var swiper = new Swiper(".mySwiper", {
        speed: 1000,
        grabCursor: true,
        loop: true,
        effect: "creative",
        autoplay: {
          delay: 2500,
          disableOnInteraction: false,
        },
        creativeEffect: {
          prev: {
            shadow: true,
            translate: [0, 0, -400],
          },
          next: {
            translate: ["100%", 0, 0],
          },
        },
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
        on: {
          slideChange: function () {
            myfnc();
            mainText[this.realIndex].classList.add("on");
            mainText[this.realIndex].querySelector("h1").classList.add("on");
            document.querySelector(".page .start").innerText = `0${
              this.realIndex + 1
            }`;
            document.querySelector(".page .end").innerText = `0${len}`;
          },
        },
      });
    </script>
  </body>
</html>
