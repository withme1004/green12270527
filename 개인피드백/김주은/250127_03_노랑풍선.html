<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>노랑풍선</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      ul {
        list-style: none;
        width: 1480px;
        height: 500px;
        margin: 100px auto 0;
      }

      li {
        position: relative;
        float: left;
        width: calc((100% - 112px) / 8);
        height: 100%;
        text-align: center;
        box-sizing: border-box;
        margin-right: 16px;
        border-radius: 12px;
        overflow: hidden;
      }

      li:last-child {
        margin-right: 0;
      }

      li::after {
        position: absolute;
        top: 0;
        left: 0;
        content: "";
        background-color: #000;
        opacity: 0.2;
        width: 100%;
        height: 100%;
      }

      li:first-child {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_1.jpg)
          center/cover;
      }
      li:nth-child(2) {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_2.jpg)
          60% center/cover;
      }
      li:nth-child(3) {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_4.jpg)
          10% center/cover;
      }
      li:nth-child(4) {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_5.jpg)
          center/cover;
      }
      li:nth-child(5) {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_6.jpg)
          center/cover;
      }
      li:nth-child(6) {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_3.jpg)
          30% center/cover;
      }
      li:nth-child(7) {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_7.jpg)
          center/cover;
      }
      li:last-child {
        background: url(https://company.ybtour.co.kr/images/bg/bg_category_8.jpg)
          right/cover;
      }

      h1 {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: Noto Sans, serif;
        font-weight: 800;
        font-size: 24px;
        color: #fff;
        width: 100%;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <ul>
      <li><h1>Package</h1></li>
      <li><h1>Honeymoon</h1></li>
      <li>
        <h1>Golf<br />& Theme</h1>
      </li>
      <li><h1>Air Ticket</h1></li>
      <li><h1>Hotel</h1></li>
      <li>
        <h1>Tour<br />& Ticket</h1>
      </li>
      <li><h1>Domestic</h1></li>
      <li><h1>Incentive</h1></li>
    </ul>
  </body>
</html>
