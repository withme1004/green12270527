<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한솔PNS</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_outward"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      input {
        display: none;
      }

      .wrap {
        width: 100%;
        height: 500px;
        background: url(https://www.doosanrobotics.com/images/sub/sub-bg13.jpg)
          center/cover no-repeat;
        font-family: Pretendard, serif;
      }
      .wrap .inner {
        display: flex;
        flex-direction: column;
        /* align-items: center; */
        height: 100%;
        justify-content: flex-end;
      }
      .menulist {
        display: flex;
      }

      .menulist label {
        text-align: center;
        padding: 10px 0;
        background: #282b2e;
        color: #fff;
        width: 300px;
        position: relative;
        cursor: pointer;
      }

      .menulist label::after {
        position: absolute;
        content: "";
        background: url(./두산로보틱스/images/arrow-down-light.svg) center/cover
          no-repeat;
        width: 12px;
        height: 6px;
        top: 50%;
        right: 70px;
        transform: translate(-50%, -50%);
      }

      #menu1:checked ~ .wrap .con ul:first-of-type,
      #menu2:checked ~ .wrap .con ul:last-of-type {
        height: 150px;
      }

      .con {
        display: flex;
      }

      .con ul {
        list-style: none;
        width: 300px;
        background: #fff;
        transition: 0.5s;
        height: 0px;
        overflow: hidden;
        box-sizing: border-box;
      }

      .con ul li {
        display: flex;
        width: 100%;
        height: calc(150px / 4);
      }

      .con ul li a {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #000;
        text-decoration: none;
      }

      .con ul li a:hover {
        color: #097cd3;
      }
    </style>
  </head>
  <body>
    <input type="radio" name="menu" id="menu1" />
    <input type="radio" name="menu" id="menu2" />
    <div class="wrap">
      <div class="inner">
        <div class="menulist">
          <label for="menu1">교육 & 서비스</label>
          <label for="menu2">두산 로봇 교육</label>
        </div>
        <div class="con">
          <ul>
            <li><a href="#">제품 & 솔루션</a></li>
            <li><a href="#">교육 & 서비스</a></li>
            <li><a href="#">투자정보</a></li>
            <li><a href="#">회사소개</a></li>
          </ul>
          <ul>
            <li><a href="#">두산 로봇 교육</a></li>
            <li><a href="#">다운로드 센터</a></li>
            <li><a href="#">A/S 신청</a></li>
            <li>
              <a href="#"
                >파트너 서비스<span class="material-symbols-outlined">
                  arrow_outward
                </span></a
              >
            </li>
          </ul>
        </div>
      </div>
    </div>
    <section>
      <p>다음섹션입니다.</p>
      <p>다음섹션입니다.</p>
      <p>다음섹션입니다.</p>
      <p>다음섹션입니다.</p>
      <p>다음섹션입니다.</p>
      <p>다음섹션입니다.</p>
      <p>다음섹션입니다.</p>
    </section>
  </body>
</html>
