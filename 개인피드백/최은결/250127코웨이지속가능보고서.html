<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ul {
        list-style: none;
      }
      div.con {
        width: 1120px;
        height: 410px;
        margin: 0 auto;
      }
      div.con .txt {
        margin: 20px 0;
      }
      ul.head {
        height: 100%;
      }
      ul.head li {
        width: calc(100% / 3);
        height: 100%;
        float: left;
      }
      ul.head li:first-child {
        background: url(https://sustainability.coway.co.kr/images/main/policy-img-1.jpg)
          center;
      }
      ul.head li:nth-child(2) {
        background: url(https://sustainability.coway.co.kr/images/main/policy-img-2.jpg)
          center;
      }
      ul.head li:last-child {
        background-image: url(https://sustainability.coway.co.kr/images/main/policy-img-3.jpg);

        background-position: center;
      }
      ul.head p {
        text-align: center;
        padding-top: 85px;
      }
    </style>
  </head>
  <body>
    <div class="con">
      <div class="txt">
        <h1>ESG Policy & Performance</h1>
        <p>
          코웨이의 ESG는 환경, 사회, 지배구조에 대한 차별화된 접근 방식을
          반영하며, 이를 통해 장기적인 성과와 지속가능한 가치 창출을 추구합니다.
        </p>
      </div>
      <ul class="head">
        <li>
          <p>Environmental</p>
          <p><a href="#">+</a></p>
        </li>
        <li>
          <p>Social</p>
          <p><a href="#">+</a></p>
        </li>
        <li>
          <p>Governance</p>
          <p><a href="#">+</a></p>
        </li>
      </ul>
    </div>
  </body>
</html>
