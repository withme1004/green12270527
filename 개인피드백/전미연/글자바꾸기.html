<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul li {
        position: relative;
      }
      ul.one li:first-child a::before {
        content: "brand";
        width: 100%;
        height: 100%;
        position: absolute;
        left: 0;
        top: 0;
        display: block;
      }
      ul.one li:first-child:hover a::before {
        content: "";
      }
      ul.one li:first-child:hover a::after {
        content: "브랜드";
      }
      ul.two li a span:nth-child(2) {
        display: none;
      }
      ul.two li:hover a span:nth-child(1) {
        display: none;
      }
      ul.two li:first-child:hover a span:nth-child(2) {
        display: block;
      }
    </style>
  </head>
  <body>
    <ul class="one">
      <li>
        <a href="#"></a>
      </li>
    </ul>

    <ul class="two">
      <li>
        <a href="">
          <span>brand</span>
          <span>브랜드</span>
        </a>
      </li>
    </ul>
  </body>
</html>
