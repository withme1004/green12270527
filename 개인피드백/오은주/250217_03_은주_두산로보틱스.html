<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      a {
        color: black;
        text-decoration: none;
      }
      input {
        display: none;
      }
      .wrap {
        /* width: 440px; */
        height: 500px;
        /* margin: 0 auto; */
        display: flex;
        background: url(https://www.doosanrobotics.com/images/sub/sub-bg13.jpg);
        justify-content: center;
      }
      .wrap .con1,
      .wrap .con2 {
        width: 220px;
        /* height: 500px; */
        /* display: flex;
        flex-direction: column;
        align-items: center; */
      }
      .one,
      .two {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 220px;
        height: 60px;
        background: rgb(20, 20, 20);
      }
      .one label,
      .two label {
        color: #fff;
      }

      .wrap .list1,
      .wrap .list2 {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 0;
        transition: 1s;
        overflow: hidden;
      }

      #menu1:checked ~ .wrap .list1,
      #menu2:checked ~ .wrap .list2 {
        height: 220px;
      }

      #menu1:checked ~ .wrap .con1 .one p {
        content: url(https://www.doosanrobotics.com/images/arrow-down-light.svg);
      }
    </style>
  </head>
  <body>
    <input type="radio" name="menu" id="menu1" />
    <input type="radio" name="menu" id="menu2" />
    <div class="wrap">
      <div class="con1">
        <div class="one">
          <label for="menu1">교육&서비스</label>
          <p>
            <img
              src="https://www.doosanrobotics.com/images/arrow-down-light.svg"
              alt=""
            />
          </p>
        </div>
        <div class="list1">
          <a href="#">제품 & 솔루션</a>
          <a href="#">교육 & 서비스</a>
          <a href="#">투자정보</a>
          <a href="#">회사소개</a>
        </div>
      </div>
      <div class="con2">
        <div class="two">
          <label for="menu2">두산 로봇 교육</label>
          <p>
            <img
              src="https://www.doosanrobotics.com/images/arrow-down-light.svg"
              alt=""
            />
          </p>
        </div>
        <div class="list2">
          <a href="#">제품 & 솔루션</a>
          <a href="#">교육 & 서비스</a>
          <a href="#">투자정보</a>
          <a href="#">회사소개</a>
        </div>
      </div>
    </div>
  </body>
</html>
