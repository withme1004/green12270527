<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>fullPage.js + AOS FIX</title>

    <!-- fullPage CSS -->
    <link rel="stylesheet" href="./css/jquery.fullPage.css" />

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      .section {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2rem;
        color: white;
        height: 100vh;
      }
      .section:nth-child(1) {
        background: #1abc9c;
      }
      .section:nth-child(2) {
        background: #3498db;
      }
      .section:nth-child(3) {
        background: #9b59b6;
      }
    </style>
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
    <script src="http://ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/jquery-ui.min.js"></script>
    <script src="./js/jquery.fullPage.js"></script>
  </head>
  <body>
    <div id="fullpage">
      <div class="section">
        <div data-aos="fade-up">첫 번째 섹션</div>
      </div>
      <div class="section">
        <div data-aos="zoom-in">두 번째 섹션</div>
      </div>
      <div class="section">
        <div data-aos="flip-left">세 번째 섹션</div>
      </div>
    </div>

    <!-- JS 로딩 -->

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
      AOS.init({
        once: false,
        startEvent: "load",
      });

      $("#fullpage").fullpage({
        autoScrolling: true,
        navigation: true,
        onLeave: function (index, nextIndex, direction) {
          setTimeout(function () {
            var $currentSection = $(".section").eq(nextIndex - 1);
            var $aosElements = $currentSection.find("[data-aos]");

            $aosElements.each(function () {
              $(this).removeClass("aos-animate");
              void this.offsetWidth; // reflow 트릭
              $(this).addClass("aos-animate");
            });
          }, 100);
        },
      });
    </script>
  </body>
</html>
