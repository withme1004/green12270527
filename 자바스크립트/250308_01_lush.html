<!DOCTYPE html>
<html lang="ko">

    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ul {
        list-style: none;
      }
      .lush {
        display: flex;
        width: 100%;
        height: 720px;
        background-color: #fafafa;
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        justify-content: center;
        align-items: center;
      }
      .lush ul {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 94px 177px;
      }
      .lush ul li a {
        display: block;
        width: 180px;
        height: 180px;
        cursor: pointer;
        border-radius: 50%;
        background-color: #222;
        background-repeat: no-repeat;
        background-position: center;
      }
    </style>
  </head>
